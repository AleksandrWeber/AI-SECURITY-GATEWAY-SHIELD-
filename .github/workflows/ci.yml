name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build
      - run: pnpm test
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e
        env:
          CI: true

      - name: Build SHIELD GitHub Action
        run: pnpm --filter @shield/action build

      - name: Dogfood action on safe fixtures
        uses: ./
        with:
          paths: packages/action/fixtures/safe/**
          fail-on-risk: SUSPICIOUS
